{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4">
    <div class="bg-white p-8 rounded-lg shadow-sm w-full max-w-sm border border-slate-100">
        <!-- Header -->
        <div class="text-center mb-6">
            <h2 class="text-2xl font-bold text-slate-800">Welcome Back</h2>
            <p class="text-slate-500 mt-1 text-sm">Sign in to your account</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 p-3 rounded-lg border text-sm {% if message.tags == 'error' %}bg-red-50 border-red-200 text-red-800{% else %}bg-green-50 border-green-200 text-green-800{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <!-- Login Form -->
        <form method="post" action="{% url 'login' %}" class="space-y-4">
            {% csrf_token %}

            <div>
                <label for="login-email" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                <input type="email" name="email" id="login-email" required
                    class="block w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring focus:ring-primary/20 focus:border-primary text-sm"
                    placeholder="your@email.com">
            </div>

            <div>
                <label for="login-password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                <input type="password" name="password" id="login-password" required
                    class="block w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring focus:ring-primary/20 focus:border-primary text-sm"
                    placeholder="Enter your password">
            </div>

            <button type="submit" class="w-full py-2.5 px-4 rounded-lg text-sm font-medium text-white bg-primary hover:bg-teal-800 transition-colors">
                Sign in
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-slate-500">
            Don't have an account?
            <a href="{% url 'register' %}" class="text-primary font-medium hover:underline">Register</a>
        </p>
    </div>
</div>
{% endblock %}
